app-id: com.github.vikdevelop.canvadesktop
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: canva.sh
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
finish-args:
  - --share=ipc
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-download
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
modules:
  - name: canva
    buildsystem: simple
    build-options:
        env:
          XDG_CACHE_HOME: /run/build/canva/flatpak-node/cache
        build-args:
        - --share=network
    build-commands:
    - yarn install --ignore-scripts
    - mkdir canva
    - yarn package:linux
    - mkdir /app/main
    - cp -R canva/canva-linux-x64/* /app/main
    - install -D -t /app/bin canva.sh
    - install -D -t /app/share/applications flatpak/com.github.vikdevelop.canvadesktop.desktop
    - install -D -t /app/share/metainfo flatpak/com.github.vikdevelop.canvadesktop.metainfo.xml
    - install -D -t /app/share/icons/hicolor/128x128/apps resources/com.github.vikdevelop.canvadesktop.png
    sources:
      - type: dir
        path: .
      - type: file
        url: https://github.com/electron/electron/releases/download/v41.2.0/electron-v41.2.0-linux-x64.zip
        sha256: fb0b31f5bb2b248d571c08ab57437c08a69b57f63ccdf9e55d6692b6132848d4
        dest: electron-dist
      - type: script
        dest-filename: canva.sh
        commands:
          - zypak-wrapper.sh /app/main/canva "$@"
